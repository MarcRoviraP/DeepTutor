<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Avatar 3D</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --bg: #13131b;
        --accent: #c0c1ff;
        --accent-glow: rgba(192, 193, 255, 0.15);
    }
    body { 
        height: 100vh; 
        overflow: hidden; 
        background: var(--bg); 
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #scene-wrap {
        position: relative; 
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, var(--bg) 70%);
    }
    canvas { 
        width: 100% !important; 
        height: 100% !important; 
        outline: none;
    }
    #loading {
        position: absolute; 
        inset: 0; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        background: var(--bg);
        transition: opacity 0.5s;
        z-index: 10;
    }
    .spinner { 
        width: 30px; 
        height: 30px; 
        border: 2px solid rgba(192, 193, 255, 0.1); 
        border-top-color: var(--accent); 
        border-radius: 50%; 
        animation: spin 0.8s linear infinite; 
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Visualizer overlay */
    #viz {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 24px;
        opacity: 0;
        transition: opacity 0.4s;
    }
    #viz.on { opacity: 0.6; }
    .bar { width: 3px; background: var(--accent); border-radius: 1px; min-height: 2px; }
</style>
</head>
<body>

<div id="scene-wrap">
    <div id="loading"><div class="spinner"></div></div>
    <canvas id="c"></canvas>
    <div id="viz">
        <div class="bar" style="height:5px"></div>
        <div class="bar" style="height:10px"></div>
        <div class="bar" style="height:18px"></div>
        <div class="bar" style="height:12px"></div>
        <div class="bar" style="height:6px"></div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

const wrap = document.getElementById('scene-wrap');
const canvas = document.getElementById('c');
const viz = document.getElementById('viz');

const scene = new THREE.Scene();
const clock = new THREE.Clock();
const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.01, 100);
camera.position.set(0, 1.55, 2.6);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.4, 0);
controls.enablePan = false;
controls.minDistance = 1;
controls.maxDistance = 6;

// Lights matched to DeepTutor theme
scene.add(new THREE.AmbientLight(0xc0c1ff, 0.5));
const dirL = new THREE.DirectionalLight(0xffffff, 1.2);
dirL.position.set(1, 3, 2);
scene.add(dirL);

const rimL = new THREE.PointLight(0xc0c1ff, 2, 5);
rimL.position.set(0, 2, -2);
scene.add(rimL);

const GLB_URL = '/avatar/sketchbot.glb';

let avatarGroup = null;
let hablando = false;
let mixer = null;
let idleAction = null;
let talkAction = null;
let actions = {};
let activeAction = null;

// Variables para animaciones procedimentales
let headNode = null;
const antennaNodes = [];
const eyeNodes = [];
let thinkingMode = false;
let currentMood = 'normal'; // normal, error, alert, love
let blinkValue = 1;
let blinkTimer = 2;

// Escuchar mensajes del padre para estados
window.addEventListener('message', (e) => {
    if (e.data.type === 'thinking') {
        thinkingMode = e.data.value;
    }
    if (e.data.type === 'mood') {
        currentMood = e.data.value;
    }
});

function cargarAvatar() {
    new GLTFLoader().load(GLB_URL, gltf => {
        const m = gltf.scene;
        
        m.traverse(node => {
            if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
                
                // Clonar materiales de ojos para que cambien de color independientemente si es necesario
                if (node.name.toLowerCase().includes('eye') || node.name.toLowerCase().includes('ojo')) {
                    node.material = node.material.clone();
                    eyeNodes.push(node);
                }
            }
            // Identificar partes por nombre para animación manual
            const name = node.name.toLowerCase();
            if (name.includes('head') || name.includes('cabeza')) headNode = node;
            if (name.includes('antenna') || name.includes('antena')) antennaNodes.push(node);
        });
        
        m.position.set(0, 0.6, 0.05); 
        m.scale.setScalar(0.8);
        m.userData.baseScale = 0.8;
        m.userData.baseY = 1;

        scene.add(m);
        avatarGroup = m;

        if (gltf.animations.length) {
            mixer = new THREE.AnimationMixer(m);
            const animationNames = gltf.animations.map(a => a.name);
            
            gltf.animations.forEach(clip => {
                const action = mixer.clipAction(clip);
                actions[clip.name] = action;
            });

            window.parent.postMessage({ 
                type: 'animations_loaded', 
                animations: animationNames 
            }, '*');

            console.group('%c[MENTOR] Animaciones Disponibles', 'color: #00ffff; font-weight: bold;');
            console.table(animationNames);
            console.groupEnd();

            const idleClip = gltf.animations.find(a => a.name.toLowerCase().includes('idle')) || gltf.animations[0];
            idleAction = actions[idleClip.name];
            idleAction.play();
            activeAction = idleAction;

            const talkClip = gltf.animations.find(a => a.name.toLowerCase().includes('talk')) || gltf.animations[1];
            if (talkClip) talkAction = actions[talkClip.name];
        }

        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => document.getElementById('loading').remove(), 500);

    }, null, err => {
        console.error('Error loading avatar:', err);
        document.getElementById('loading').remove();
    });
}

cargarAvatar();

window.addEventListener('resize', () => {
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
});

function getActionByName(name) {
    if (actions[name]) return actions[name];
    
    // Búsqueda insensible a mayúsculas
    const lowerName = name.toLowerCase();
    const found = Object.keys(actions).find(k => k.toLowerCase() === lowerName);
    if (found) return actions[found];

    // Búsqueda parcial (ej. "talk" -> "Talk_Animation")
    const partial = Object.keys(actions).find(k => k.toLowerCase().includes(lowerName));
    if (partial) return actions[partial];

    return null;
}

function fadeToAction(name, duration = 0.3) {
    const nextAction = getActionByName(name);
    if (!nextAction) {
        console.warn(`[MENTOR] Animación no encontrada: ${name}`);
        return;
    }
    if (nextAction === activeAction) return;

    nextAction.reset();
    nextAction.setEffectiveTimeScale(1);
    nextAction.setEffectiveWeight(1);
    nextAction.fadeIn(duration);
    nextAction.play();

    if (activeAction) {
        activeAction.fadeOut(duration);
    }

    activeAction = nextAction;
}

function playOneShot(name, duration = 0.3) {
    const shot = getActionByName(name);
    if (!shot) {
        console.warn(`[MENTOR] Gesto no encontrado: ${name}`);
        return;
    }

    shot.reset();
    shot.setLoop(THREE.LoopOnce);
    shot.clampWhenFinished = true;
    shot.fadeIn(duration);
    shot.play();
    
    const prevAction = activeAction;
    if (prevAction) prevAction.fadeOut(duration);
    
    activeAction = shot;

    // Volver a la anterior cuando termine
    const onFinished = (e) => {
        if (e.action === shot) {
            mixer.removeEventListener('finished', onFinished);
            if (prevAction) fadeToAction(prevAction._clip.name, duration);
        }
    };
    mixer.addEventListener('finished', onFinished);
}

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const t = clock.getElapsedTime();
    
    controls.update();
    if (mixer) mixer.update(dt);

    if (avatarGroup) {
        // Levitación básica
        avatarGroup.position.y = (avatarGroup.userData.baseY || 0.6) + Math.sin(t * 1.5) * 0.05;
        
        // --- ANIMACIONES PROCEDIMENTALES ---
        
        // 1. Wiggle de Antenas (Autónomo)
        antennaNodes.forEach((ant, i) => {
            const speed = thinkingMode ? 25 : 4;
            const amplitude = thinkingMode ? 0.3 : 0.08;
            ant.rotation.z = Math.sin(t * speed + i) * amplitude;
            ant.rotation.x = Math.cos(t * speed * 0.8 + i) * amplitude;
        });

        // 2. Efecto "Pensando"
        if (thinkingMode && headNode) {
            headNode.rotation.z = Math.sin(t * 12) * 0.15;
            headNode.rotation.x = 0.4 + Math.sin(t * 6) * 0.1;
        } else if (headNode) {
            // Reset de cabeza si no piensa
            headNode.rotation.z += (0 - headNode.rotation.z) * 0.1;
            headNode.rotation.x += (0 - headNode.rotation.x) * 0.1;
            headNode.rotation.y += (0 - headNode.rotation.y) * 0.1;
        }

        // 3. Parpadeo y Color de Ojos
        blinkTimer -= dt;
        if (blinkTimer <= 0) {
            blinkValue = 0; // Cerrar
            if (blinkTimer < -0.12) { // Duración del parpadeo
                blinkTimer = 2 + Math.random() * 5;
                blinkValue = 1; // Abrir
            }
        }

        eyeNodes.forEach(eye => {
            // Aplicar parpadeo (escala Y)
            eye.scale.y += (blinkValue - eye.scale.y) * 0.5;

            // Color de emisión por estado
            if (eye.material && eye.material.emissive) {
                let targetColor = new THREE.Color(0x00ffff); // Normal (Cian)
                let intensity = 1.5;

                if (currentMood === 'error') {
                    targetColor = new THREE.Color(0xff0000); // Rojo
                    intensity = 3.5;
                } else if (currentMood === 'alert') {
                    targetColor = new THREE.Color(0xffcc00); // Amarillo
                    intensity = 2.5;
                } else if (currentMood === 'love') {
                    targetColor = new THREE.Color(0xff00bb); // Rosa/Magenta
                    // Efecto latido para Love
                    intensity = 2 + Math.sin(t * 4) * 1.5;
                } else if (thinkingMode) {
                    targetColor = new THREE.Color(0xff8800); // Naranja
                    intensity = 2.5;
                }

                eye.material.emissive.lerp(targetColor, 0.08);
                eye.material.emissiveIntensity = intensity;
            }
        });

        if (hablando) {
            if (talkAction && activeAction !== talkAction) {
                fadeToAction(talkAction._clip.name);
            }
            // Visualizer bars
            document.querySelectorAll('.bar').forEach((b, i) => {
                b.style.height = (4 + Math.abs(Math.sin(t * (6 + i) + i)) * 18) + 'px';
            });
        } else {
            if (activeAction === talkAction) {
                fadeToAction(idleAction._clip.name);
            }
        }
    }
    renderer.render(scene, camera);
}
animate();

// --- API for Chat communication ---
let _audio = null;
let _sesionId = 0;

async function hablarTexto(texto) {
    const apiURL = 'http://68.221.175.191:5000/tts';
    if (!texto) return;

    _sesionId++;
    const sesion = _sesionId;
    
    if (_audio) { _audio.pause(); _audio = null; }
    hablando = true;
    viz.classList.add('on');

    const chunks = dividirEnChunks(texto);
    console.log('[MENTOR] Texto dividido en', chunks.length, 'chunks');
    
    // Iniciar descargas en paralelo para no esperar entre audios
    const audioPromises = chunks.map(async (chunk, index) => {
        try {
            if (_sesionId !== sesion) return null;
            console.log(`[MENTOR] Descargando chunk ${index + 1}...`);
            const res = await fetch(apiURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    text: chunk,
                    voice: "es_ES-sharvard-medium"
                }),
            });
            if (!res.ok) throw new Error(`Error TTS: ${res.status}`);
            const blob = await res.blob();
            return URL.createObjectURL(blob);
        } catch (err) {
            console.error(`[MENTOR] Error en descarga de chunk ${index + 1}:`, err);
            return null;
        }
    });

    try {
        for (let i = 0; i < audioPromises.length; i++) {
            if (_sesionId !== sesion) break;
            
            const url = await audioPromises[i];
            if (!url) continue;

            console.log(`[MENTOR] Reproduciendo chunk ${i + 1}/${chunks.length}...`);
            await new Promise((resolve, reject) => {
                if (_sesionId !== sesion) return resolve();
                const a = new Audio(url);
                _audio = a;
                a.onended = () => { 
                    URL.revokeObjectURL(url); 
                    resolve(); 
                };
                a.onerror = () => { URL.revokeObjectURL(url); reject(); };
                a.play().catch(reject);
            });
        }
    } catch (e) {
        console.error('TTS Error:', e);
    } finally {
        if (_sesionId === sesion) {
            hablando = false;
            viz.classList.remove('on');
        }
    }
}

function dividirEnChunks(texto) {
    const limit = 500;
    const chunks = [];
    let current = "";
    texto.split(/[.!?]\s+/).forEach(sentence => {
        if ((current + sentence).length > limit) {
            chunks.push(current.trim());
            current = sentence + ". ";
        } else {
            current += sentence + ". ";
        }
    });
    if (current.trim()) chunks.push(current.trim());
    return chunks;
}

window.addEventListener('message', e => {
    console.log('Mentor received message:', e.data);
    if (e.data.type === 'speak') {
        console.log('Starting speech for:', e.data.text.substring(0, 30) + '...');
        hablarTexto(e.data.text);
    }
    if (e.data.type === 'stop') {
        console.log('Stopping speech');
        _sesionId++;
        if (_audio) { _audio.pause(); _audio = null; }
        hablando = false;
        viz.classList.remove('on');
    }
    if (e.data.type === 'gesture') {
        console.log('Playing gesture:', e.data.gesture);
        if (e.data.oneShot) {
            playOneShot(e.data.gesture);
        } else {
            fadeToAction(e.data.gesture);
        }
    }
});

</script>
</body>
</html>
