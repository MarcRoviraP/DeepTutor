<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Avatar 3D</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --bg: #13131b;
        --accent: #c0c1ff;
        --accent-glow: rgba(192, 193, 255, 0.15);
    }
    body { 
        height: 100vh; 
        overflow: hidden; 
        background: var(--bg); 
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #scene-wrap {
        position: relative; 
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, var(--bg) 70%);
    }
    canvas { 
        width: 100% !important; 
        height: 100% !important; 
        outline: none;
    }
    #loading {
        position: absolute; 
        inset: 0; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        background: var(--bg);
        transition: opacity 0.5s;
        z-index: 10;
    }
    .spinner { 
        width: 30px; 
        height: 30px; 
        border: 2px solid rgba(192, 193, 255, 0.1); 
        border-top-color: var(--accent); 
        border-radius: 50%; 
        animation: spin 0.8s linear infinite; 
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Visualizer overlay */
    #viz {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 24px;
        opacity: 0;
        transition: opacity 0.4s;
    }
    #viz.on { opacity: 0.6; }
    .bar { width: 3px; background: var(--accent); border-radius: 1px; min-height: 2px; }
</style>
</head>
<body>

<div id="scene-wrap">
    <div id="loading"><div class="spinner"></div></div>
    <canvas id="c"></canvas>
    <div id="viz">
        <div class="bar" style="height:5px"></div>
        <div class="bar" style="height:10px"></div>
        <div class="bar" style="height:18px"></div>
        <div class="bar" style="height:12px"></div>
        <div class="bar" style="height:6px"></div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

const wrap = document.getElementById('scene-wrap');
const canvas = document.getElementById('c');
const viz = document.getElementById('viz');

const scene = new THREE.Scene();
const clock = new THREE.Clock();
const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.01, 100);
camera.position.set(0, 1.55, 2.6);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.4, 0);
controls.enablePan = false;
controls.minDistance = 1;
controls.maxDistance = 6;

// Lights matched to DeepTutor theme
scene.add(new THREE.AmbientLight(0xc0c1ff, 0.5));
const dirL = new THREE.DirectionalLight(0xffffff, 1.2);
dirL.position.set(1, 3, 2);
scene.add(dirL);

const rimL = new THREE.PointLight(0xc0c1ff, 2, 5);
rimL.position.set(0, 2, -2);
scene.add(rimL);

let avatarGroup = null;
let hablando = false;
let tHabla = 0;
let mixer = null;
let idleAction = null;
let talkAction = null;

const GLB_URL = '/avatar/sketchbot.glb';

function cargarAvatar() {
    new GLTFLoader().load(GLB_URL, gltf => {
        const m = gltf.scene;
        const box = new THREE.Box3().setFromObject(m);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        
        m.position.sub(center);
        m.position.set(0, 0.6, 0.05); 
        m.scale.setScalar(0.8);
        m.userData.baseScale = 0.8;
        m.userData.baseY = 1;

        scene.add(m);
        avatarGroup = m;

        if (gltf.animations.length) {
            mixer = new THREE.AnimationMixer(m);
            idleAction = mixer.clipAction(gltf.animations[0]);
            idleAction.play();
            if (gltf.animations.length > 1) {
                talkAction = mixer.clipAction(gltf.animations[1]);
            }
        }

        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => document.getElementById('loading').remove(), 500);

    }, null, err => {
        console.error('Error loading avatar:', err);
        document.getElementById('loading').remove();
    });
}

cargarAvatar();

window.addEventListener('resize', () => {
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
});

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const t = clock.getElapsedTime();
    
    controls.update();
    if (mixer) mixer.update(dt);

    if (avatarGroup) {
        avatarGroup.rotation.y = Math.sin(t * 0.5) * 0.15;
        avatarGroup.position.y = avatarGroup.userData.baseY + Math.sin(t * 1.2) * 0.04;

        if (hablando) {
            tHabla += dt;
            if (talkAction && !talkAction.isRunning()) {
                talkAction.play();
                if (idleAction) idleAction.crossFadeTo(talkAction, 0.3);
            }
            // Visualizer bars
            document.querySelectorAll('.bar').forEach((b, i) => {
                b.style.height = (4 + Math.abs(Math.sin(t * (6 + i) + i)) * 18) + 'px';
            });
        } else {
            if (talkAction && talkAction.isRunning()) {
                talkAction.stop();
                if (idleAction) idleAction.play();
            }
        }
    }
    renderer.render(scene, camera);
}
animate();

// --- API for Chat communication ---
let _audio = null;
let _sesionId = 0;

async function hablarTexto(texto) {
    const apiURL = 'http://68.221.175.191:5000/tts';
    if (!texto) return;

    _sesionId++;
    const sesion = _sesionId;
    
    if (_audio) { _audio.pause(); _audio = null; }
    hablando = true;
    viz.classList.add('on');

    const chunks = dividirEnChunks(texto);
    console.log('[MENTOR] Texto dividido en', chunks.length, 'chunks');
    
    // Iniciar descargas en paralelo para no esperar entre audios
    const audioPromises = chunks.map(async (chunk, index) => {
        try {
            if (_sesionId !== sesion) return null;
            console.log(`[MENTOR] Descargando chunk ${index + 1}...`);
            const res = await fetch(apiURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    text: chunk,
                    voice: "es_ES-sharvard-medium"
                }),
            });
            if (!res.ok) throw new Error(`Error TTS: ${res.status}`);
            const blob = await res.blob();
            return URL.createObjectURL(blob);
        } catch (err) {
            console.error(`[MENTOR] Error en descarga de chunk ${index + 1}:`, err);
            return null;
        }
    });

    try {
        for (let i = 0; i < audioPromises.length; i++) {
            if (_sesionId !== sesion) break;
            
            const url = await audioPromises[i];
            if (!url) continue;

            console.log(`[MENTOR] Reproduciendo chunk ${i + 1}/${chunks.length}...`);
            await new Promise((resolve, reject) => {
                if (_sesionId !== sesion) return resolve();
                const a = new Audio(url);
                _audio = a;
                a.onended = () => { 
                    URL.revokeObjectURL(url); 
                    resolve(); 
                };
                a.onerror = () => { URL.revokeObjectURL(url); reject(); };
                a.play().catch(reject);
            });
        }
    } catch (e) {
        console.error('TTS Error:', e);
    } finally {
        if (_sesionId === sesion) {
            hablando = false;
            viz.classList.remove('on');
        }
    }
}

function dividirEnChunks(texto) {
    const limit = 500;
    const chunks = [];
    let current = "";
    texto.split(/[.!?]\s+/).forEach(sentence => {
        if ((current + sentence).length > limit) {
            chunks.push(current.trim());
            current = sentence + ". ";
        } else {
            current += sentence + ". ";
        }
    });
    if (current.trim()) chunks.push(current.trim());
    return chunks;
}

window.addEventListener('message', e => {
    console.log('Mentor received message:', e.data);
    if (e.data.type === 'speak') {
        console.log('Starting speech for:', e.data.text.substring(0, 30) + '...');
        hablarTexto(e.data.text);
    }
    if (e.data.type === 'stop') {
        console.log('Stopping speech');
        _sesionId++;
        if (_audio) { _audio.pause(); _audio = null; }
        hablando = false;
        viz.classList.remove('on');
    }
});

</script>
</body>
</html>
