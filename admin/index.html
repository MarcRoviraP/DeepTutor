<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepTutor Admin | Master Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #f43f5e;
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.1) 0, transparent 50%);
        }

        /* Sidebar */
        aside {
            width: 280px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--primary);
            padding: 0 1rem;
        }

        .table-list {
            list-style: none;
            flex-grow: 1;
            overflow-y: auto;
        }

        .table-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-dim);
            border: 1px solid transparent;
        }

        .table-item:hover {
            background: var(--glass);
            color: var(--text);
        }

        .table-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--glass);
        }

        /* Table Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem;
            color: var(--text-dim);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-id { background: var(--glass); color: var(--text-dim); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 600px;
            max-width: 90%;
            padding: 2rem;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 350px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #4ade80;
            font-family: 'Fira Code', 'Courier New', monospace;
            padding: 1.5rem;
            margin: 1.5rem 0;
            resize: none;
            line-height: 1.6;
            outline: none;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--glass);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <i data-lucide="shield-check"></i>
            <span>DeepTutor Admin</span>
        </div>
        <ul class="table-list" id="tableList">
            <!-- Tables will be injected here -->
        </ul>
        <div style="margin-top: auto; padding: 1rem; font-size: 0.8rem; color: var(--text-dim);">
            Connected to 68.221.175.191:5001
        </div>
    </aside>

    <main>
        <header>
            <div>
                <p id="breadcrumb" style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 0.5rem;">Database / Tables</p>
                <h1 id="currentTableName">Selecciona una tabla</h1>
            </div>
            <div class="actions">
                <button class="btn btn-outline" onclick="loadData()">
                    <i data-lucide="refresh-cw"></i> Actualizar
                </button>
                <button class="btn btn-primary" onclick="openBulkModal()">
                    <i data-lucide="layers"></i> Bulk Insert
                </button>
            </div>
        </header>

        <div class="stats" id="statsContainer">
            <!-- Stats will be injected here -->
        </div>

        <div class="card">
            <div class="table-container">
                <table id="dataTable">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody">
                        <tr><td colspan="100%" style="text-align: center; padding: 4rem; color: var(--text-dim);">Selecciona una tabla para ver los datos</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal for Bulk Insert -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Bulk Insert - <span id="modalTableName"></span></h2>
            <p style="color: var(--text-dim); margin-top: 0.5rem;">Pega un array de objetos JSON para insertar múltiples registros.</p>
            <textarea id="bulkJson" spellcheck="false" placeholder='Pega tu JSON aquí...'></textarea>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="generateTemplate()" style="color: var(--success); border-color: rgba(16, 185, 129, 0.3);">
                    <i data-lucide="code"></i> Generar Plantilla
                </button>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-outline" onclick="closeBulkModal()">Cancelar</button>
                    <button class="btn btn-primary" id="btnSubmitBulk" onclick="processBulk()">Procesar Carga</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG - Injected from .env via the starter script if possible, 
        // but for now hardcoded to the ones we found.
        const API_URL = '/api-proxy';
        const API_KEY = '806bfc1ea9173997e05e9d23263556b3';

        const tables = [
            { name: 'usuarios', icon: 'users' },
            { name: 'topics', icon: 'book-open' },
            { name: 'ejercicios', icon: 'code' },
            { name: 'base_conocimiento', icon: 'library' },
            { name: 'conversaciones', icon: 'message-square' },
            { name: 'chat', icon: 'messages-square' },
            { name: 'progreso_usuario', icon: 'trending-up' },
            { name: 'errores_detectados', icon: 'alert-triangle' },
            { name: 'user_errors', icon: 'user-minus' },
            { name: 'reglas_validacion', icon: 'check-circle' },
            { name: 'casos_prueba', icon: 'test-tube' },
            { name: 'error_regla', icon: 'link' }
        ];

        let currentTable = '';
        let currentColumns = [];

        function init() {
            lucide.createIcons();
            renderTableList();
            setupSmartTextarea();
        }

        function setupSmartTextarea() {
            const tx = document.getElementById('bulkJson');
            const pairs = { '{': '}', '[': ']', '"': '"', '(': ')' };

            tx.addEventListener('keydown', (e) => {
                const start = tx.selectionStart;
                const end = tx.selectionEnd;

                // Tab support
                if (e.key === 'Tab') {
                    e.preventDefault();
                    tx.value = tx.value.substring(0, start) + "  " + tx.value.substring(end);
                    tx.selectionStart = tx.selectionEnd = start + 2;
                }

                // Auto-close pairs
                if (pairs[e.key]) {
                    e.preventDefault();
                    const close = pairs[e.key];
                    tx.value = tx.value.substring(0, start) + e.key + close + tx.value.substring(end);
                    tx.selectionStart = tx.selectionEnd = start + 1;
                }
            });
        }

        function generateTemplate() {
            if (currentColumns.length === 0) return alert('No hay columnas detectadas');
            
            // Filtramos id y created_at porque suelen ser automáticos
            const filteredCols = currentColumns.filter(c => !['id', 'created_at'].includes(c));
            const templateObj = {};
            filteredCols.forEach(c => templateObj[c] = "");
            
            const jsonTemplate = JSON.stringify([templateObj], null, 2);
            document.getElementById('bulkJson').value = jsonTemplate;
        }

        function renderTableList() {
            const list = document.getElementById('tableList');
            list.innerHTML = tables.map(t => `
                <li class="table-item ${currentTable === t.name ? 'active' : ''}" onclick="selectTable('${t.name}')">
                    <i data-lucide="${t.icon}"></i>
                    <span>${t.name}</span>
                </li>
            `).join('');
            lucide.createIcons();
        }

        async function selectTable(name) {
            currentTable = name;
            document.getElementById('currentTableName').innerText = name.charAt(0).toUpperCase() + name.slice(1);
            document.getElementById('breadcrumb').innerText = `Database / ${name}`;
            renderTableList();
            await loadData();
        }

        async function loadData() {
            if (!currentTable) return;
            const body = document.getElementById('tableBody');
            body.innerHTML = '<tr><td colspan="100%" style="text-align: center; padding: 4rem;">Cargando datos...</td></tr>';

            try {
                const response = await fetch(`${API_URL}/${currentTable}`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await response.json();

                if (!Array.isArray(data)) throw new Error('Respuesta no válida');

                renderStats(data.length);

                if (data.length === 0) {
                    // Si no hay datos, intentamos sacar las columnas de una consulta dummy o metadata si existiera
                    // Por ahora, asumimos que si está vacía no podemos generar template sin info previa
                    body.innerHTML = '<tr><td colspan="100%" style="text-align: center; padding: 4rem; color: var(--text-dim);">No hay registros en esta tabla</td></tr>';
                    currentColumns = []; 
                    return;
                }

                currentColumns = Object.keys(data[0]);
                
                // Render Header
                document.getElementById('tableHeader').innerHTML = currentColumns.map(c => `<th>${c}</th>`).join('') + '<th>Acciones</th>';

                // Render Body
                body.innerHTML = data.map(row => `
                    <tr>
                        ${currentColumns.map(c => {
                            const val = row[c];
                            if (c === 'id') return `<td><span class="badge badge-id">${val}</span></td>`;
                            if (typeof val === 'object' && val !== null) return `<td><code style="font-size: 0.7rem;">${JSON.stringify(val).slice(0, 20)}...</code></td>`;
                            if (val === null) return `<td><span style="color: var(--text-dim); opacity: 0.5;">null</span></td>`;
                            return `<td>${val}</td>`;
                        }).join('')}
                        <td>
                            <button onclick="deleteRow('${row.id}')" style="background: transparent; border: none; color: var(--accent); cursor: pointer;">
                                <i data-lucide="trash-2" size="18"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();

            } catch (err) {
                body.innerHTML = `<tr><td colspan="100%" style="text-align: center; padding: 4rem; color: var(--accent);">Error: ${err.message}</td></tr>`;
            }
        }

        function renderStats(count) {
            const container = document.getElementById('statsContainer');
            container.innerHTML = `
                <div class="stat-card">
                    <div style="color: var(--text-dim); font-size: 0.8rem;">Total Registros</div>
                    <div class="stat-value">${count}</div>
                </div>
                <div class="stat-card">
                    <div style="color: var(--text-dim); font-size: 0.8rem;">Estado API</div>
                    <div class="stat-value" style="color: var(--success);">Online</div>
                </div>
            `;
        }

        function openBulkModal() {
            if (!currentTable) return alert('Selecciona una tabla primero');
            document.getElementById('modalTableName').innerText = currentTable;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeBulkModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function processBulk() {
            const jsonText = document.getElementById('bulkJson').value;
            const btn = document.getElementById('btnSubmitBulk');
            try {
                const data = JSON.parse(jsonText);
                if (!Array.isArray(data)) throw new Error('Debe ser un array de objetos');

                btn.innerText = 'Insertando...';
                btn.disabled = true;

                let success = 0;
                for (const item of data) {
                    const res = await fetch(`${API_URL}/${currentTable}`, {
                        method: 'POST',
                        headers: { 
                            'X-API-Key': API_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(item)
                    });
                    if (res.ok) success++;
                }

                alert(`Proceso terminado: ${success} de ${data.length} insertados correctamente.`);
                closeBulkModal();
                loadData();
            } catch (err) {
                alert('Error en el JSON o en la carga: ' + err.message);
            } finally {
                btn.innerText = 'Procesar Carga';
                btn.disabled = false;
            }
        }

        async function deleteRow(id) {
            if (!confirm('¿Seguro que querés borrar este registro?')) return;
            try {
                const res = await fetch(`${API_URL}/${currentTable}/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-API-Key': API_KEY }
                });
                if (res.ok) {
                    loadData();
                } else {
                    alert('Error al borrar');
                }
            } catch (err) {
                alert(err.message);
            }
        }

        init();
    </script>
</body>
</html>
